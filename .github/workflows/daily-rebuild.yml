name: Daily Rebuild

on:
  schedule:
    - cron: '0 8 * * *' # 8:00 AM UTC daily
  workflow_dispatch: # Allow manual triggers

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: curl -X POST "$DEPLOY_HOOK"
